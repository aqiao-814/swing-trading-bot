# Config for the hosted live paper bot (GitHub Actions).
# 30-MINUTE cadence: decide on every completed 30-minute bar (13 per session,
# 09:30..15:30 ET), fill at the next bar's open. The workflow fires every 30
# minutes from the market open.
#
# Yahoo only serves ~60 days of 30-minute bars, far too little to pretrain a
# policy on -- so the live model is SEEDED from a model trained offline on five
# years of daily bars: scripts/backtest_5y.py writes
# artifacts/backtest5y/models/rrl_latest.bin, which is published to the site repo
# as state/models/rrl_latest.bin before inception. At inception the engine
# loads that seed, clears its daily-bar recurrence, then refines it on the ~60
# days of 30m history available before trading forward. `pretrain_years` here is
# just that light refinement window, not a from-scratch warm-up.
seed: 7
run_name: cloud
data:
  root: data30
features:
  # 60 days of 30m bars is only ~520 rows, so the default long-memory windows
  # (252-bar z-score, 1e-4 fracdiff ≈ 280-bar width, 300-bar warmup) would drop
  # every row. These shorter windows leave ~320 usable bars. Crucially they keep
  # return_horizons and vol_windows at their defaults, so the feature COLUMN set
  # is byte-for-byte identical to the seed model's -- only the trailing-window
  # lengths change, which does not rename any column.
  zscore_window: 100
  fracdiff_threshold: 0.01
  warmup: 60
paper:
  interval: 30m
  # DAY TRADING: flat before every close, never a position held overnight.
  # On the 15:00 ET bar (second-to-last of the 30m session) the whole book is
  # sold to zero, filling at the 15:30 open; no new position is opened on the
  # 15:00 or 15:30 bars because it could not be closed again the same day.
  day_trading: true
  universe: nasdaq100
  start: '2026-07-21T15:30'
  data_start: '2026-05-24'
  pretrain_years: 0.2
  # The seed is trained on daily bars where the recurrence drifted to u>1 (an
  # explosive recurrence -> saturated, degenerate convictions). Cap it below 1
  # so the seed is tempered on load and stays a contraction through pretraining
  # and live trading -- keeping the conviction spread the ranking depends on.
  learn_max_recurrence: 0.7

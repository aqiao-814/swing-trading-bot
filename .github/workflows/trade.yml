name: intraday-trade
# The autonomous 30-minute paper-trading run: process every newly completed
# 30-minute bar (fill queued orders at the bar's open, mark, learn, decide for
# the next bar), then publish state + dashboard data to the public site.
# Fires every 30 minutes from the market open. 09:30 ET open is 13:30 UTC in
# EDT / 14:30 UTC in EST, so the :00/:30 cadence over 13:00-21:30 UTC covers
# the full session in both, and each half-hour bar completes on the following
# :00/:30 -- the next firing picks it up. Off-hours firings are idempotent
# no-ops. A firing at the open itself is a no-op until 10:00 ET, when the day's
# first 30m bar completes.

on:
  schedule:
    - cron: "*/30 13-21 * * 1-5"
  workflow_dispatch:
    inputs:
      clear_halt:
        description: "Clear a fired kill switch and resume trading"
        type: boolean
        default: false

concurrency:
  group: portfolio-state
  cancel-in-progress: false

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install swingbot
        # gymnasium: EpisodeResult lives in env/trading_env.py, which imports it
        # at module top; the paper loop never uses it and torch stays out.
        run: pip install -e . gymnasium

      - name: Restore bar cache
        uses: actions/cache@v4
        with:
          path: data30
          key: bars30-v1-${{ github.run_id }}
          restore-keys: bars30-v1-

      - name: Pull portfolio state from site repo
        env:
          DEPLOY_KEY: ${{ secrets.SITE_DEPLOY_KEY }}
        run: |
          eval "$(ssh-agent -s)"
          echo "$DEPLOY_KEY" | ssh-add -
          export GIT_SSH_COMMAND="ssh -o StrictHostKeyChecking=accept-new"
          git clone --depth 1 git@github.com:aqiao-814/swingbot-live.git /tmp/site
          mkdir -p artifacts
          # Models are copied whether or not portfolio state exists: on a fresh
          # inception state/models/rrl_latest.bin is the SEED the engine starts
          # from (a model trained offline), so it must be in place before the
          # very first run -- not only on restored days.
          if [ -d /tmp/site/state/models ]; then
            cp -r /tmp/site/state/models artifacts/models
          fi
          if [ -d /tmp/site/state/paper ]; then
            cp -r /tmp/site/state/paper artifacts/paper
            echo "restored state through $(python -c "import json;print(json.load(open('artifacts/paper/portfolio/state.json'))['last_processed'])")"
          else
            echo "no prior portfolio state -- this run incepts, seeding from state/models if present"
          fi

      - name: Run the trading day
        run: |
          EXTRA=""
          if [ "${{ inputs.clear_halt }}" = "true" ]; then EXTRA="--clear-halt"; fi
          python -m swingbot.cli invest --config configs/cloud.yaml --capital 100000 $EXTRA \
            || (echo "retrying after 90s (data source hiccup?)" && sleep 90 && \
                python -m swingbot.cli invest --config configs/cloud.yaml --capital 100000 $EXTRA)

      - name: Export dashboard data
        run: python scripts/export_site_data.py

      - name: Refresh intraday layer
        run: pip install yfinance && python scripts/live_quotes.py || true

      - name: Publish state + site
        env:
          DEPLOY_KEY: ${{ secrets.SITE_DEPLOY_KEY }}
        run: |
          eval "$(ssh-agent -s)"
          echo "$DEPLOY_KEY" | ssh-add -
          export GIT_SSH_COMMAND="ssh -o StrictHostKeyChecking=accept-new"
          mkdir -p /tmp/site/state
          rm -rf /tmp/site/state/paper /tmp/site/state/models
          cp -r artifacts/paper /tmp/site/state/paper
          cp -r artifacts/models /tmp/site/state/models
          cp site/index.html site/data.json /tmp/site/
          cp site/live.json /tmp/site/ 2>/dev/null || true
          cd /tmp/site
          git config user.name "swingbot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && { echo "nothing to publish"; exit 0; }
          git commit -m "bar $(date -u +%FT%H:%M)"
          for i in 1 2 3; do
            git push && break
            git pull --rebase && sleep 5
          done

      - name: Keepalive
        # GitHub disables cron workflows after 60 days without repo activity,
        # and this repo's daily commits all land in the site repo. A monthly
        # heartbeat commit here keeps the schedules alive.
        run: |
          cd "$GITHUB_WORKSPACE"
          last=$(git log -1 --format=%ct)
          if [ $(( $(date +%s) - last )) -gt $(( 30 * 86400 )) ]; then
            git config user.name "swingbot"
            git config user.email "actions@users.noreply.github.com"
            date -u > .github/heartbeat
            git add .github/heartbeat
            git commit -m "keepalive heartbeat"
            git push
          else
            echo "recent activity; no heartbeat needed"
          fi
